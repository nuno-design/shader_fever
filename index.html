<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SHADER_FEVER</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%230b0c0e'/><rect x='20' y='44' width='60' height='12' fill='%23d8ff3e'/></svg>" />
<link rel="stylesheet" href="css/style.css?v=35" />
</head>
<body>

<aside class="panel">
  <header class="panel-head">
    <h1>shader<span class="cursor">_</span>fever</h1>
    <button id="btn-collapse" class="icon-btn" title="Collapse panel" aria-label="Collapse panel">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="12" height="10" rx="1.8"/><path d="M6.2 3v10"/></svg>
    </button>
  </header>

  <section class="block">
    <label class="block-label" for="shader-select">SHADER</label>
    <div class="select-wrap">
      <select id="shader-select"></select>
    </div>
  </section>

  <section class="block params-block">
    <div class="params-head">
      <span class="block-label">PARAMETERS</span>
      <div class="params-actions">
        <button id="btn-random" class="icon-btn" title="Randomize parameters" aria-label="Randomize parameters">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>
        </button>
        <button id="btn-reset" class="icon-btn" title="Reset to defaults" aria-label="Reset to defaults">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
        </button>
      </div>
    </div>
    <div id="params"></div>
  </section>

  <footer class="panel-foot">
    <div class="foot-actions">
      <button id="btn-play" class="icon-btn" title="Pause" aria-label="Pause"></button>
      <button id="btn-copy" class="icon-btn" title="Copy shader code" aria-label="Copy shader code"></button>
    </div>
    <div class="stats">
      <span id="stat-fps">— FPS</span>
      <span id="stat-res">—</span>
    </div>
  </footer>
</aside>

<main class="stage">
  <canvas id="gl"></canvas>
  <div class="stage-error" id="gl-error" hidden>WEBGL2 UNAVAILABLE</div>
</main>

<button id="btn-expand" class="icon-btn" title="Show panel" aria-label="Show panel">
  <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="12" height="10" rx="1.8"/><path d="M6.2 3v10"/></svg>
</button>

<script src="js/shaders.js?v=35"></script>
<script src="js/app.js?v=35"></script>
</body>
</html>
